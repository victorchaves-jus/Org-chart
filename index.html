<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jusbrasil · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --jus-green:      #00875A;
    --jus-green-light:#00A36C;
    --jus-green-pale: #E6F5F0;
    --jus-blue:       #0055CC;
    --jus-blue-light: #2E7CF6;
    --bg:      #FFFFFF;
    --bg2:     #F7F8FA;
    --border:  #E2E5EB;
    --border2: #C9CDD6;
    --text:    #111827;
    --text2:   #374151;
    --text3:   #6B7280;
    --danger:  #DC2626;
    --radius:  12px;
    --shadow:  0 10px 30px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--jus-green-pale), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, #EBF3FF, transparent 60%),
      var(--bg2);
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .brand-logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--jus-green), var(--jus-green-light));
    display: grid;
    place-items: center;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .5px;
  }

  .brand-name {
    font-weight: 700;
    font-size: 16px;
  }

  h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .subtitle {
    margin: 0 0 24px;
    color: var(--text3);
    font-size: 14px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    font: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  input:focus {
    border-color: var(--jus-blue-light);
    box-shadow: 0 0 0 3px rgba(46, 124, 246, 0.15);
  }

  .toggle-pass {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: 0;
    cursor: pointer;
    color: var(--text3);
    padding: 6px 8px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
  }

  .toggle-pass:hover { color: var(--text); background: var(--bg2); }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0 20px;
    font-size: 13px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }

  .remember input { accent-color: var(--jus-green); }

  a.link {
    color: var(--jus-blue);
    text-decoration: none;
    font-weight: 500;
  }
  a.link:hover { text-decoration: underline; }

  button.primary {
    width: 100%;
    padding: 12px 16px;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: var(--jus-green);
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s, transform .05s;
  }
  button.primary:hover { background: var(--jus-green-light); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: .6; cursor: not-allowed; }

  .error {
    display: none;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: var(--danger);
    border-radius: 8px;
    font-size: 13px;
  }
  .error.show { display: block; }

  .footer {
    margin-top: 22px;
    text-align: center;
    color: var(--text3);
    font-size: 12.5px;
  }
</style>
</head>
<body>
  <main class="card" role="main">
    <div class="brand">
      <div class="brand-logo" aria-hidden="true">JB</div>
      <div class="brand-name">Jusbrasil</div>
    </div>

    <h1>Entrar na sua conta</h1>
    <p class="subtitle">Acesse o painel com suas credenciais corporativas.</p>

    <div id="error" class="error" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="username"
               placeholder="voce@jusbrasil.com.br" required>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <input id="password" name="password" type="password"
                 autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar senha">
            Mostrar
          </button>
        </div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember"> Lembrar de mim
        </label>
        <a class="link" href="#" onclick="event.preventDefault()">Esqueci a senha</a>
      </div>

      <button type="submit" class="primary" id="submitBtn">Entrar</button>
    </form>

    <p class="footer">© Jusbrasil · uso interno</p>
  </main>

<script>
  // Credenciais de demonstração (apenas client-side — não use em produção real).
  const DEMO_USER = 'admin@jusbrasil.com.br';
  const DEMO_PASS = '123456';

  const form     = document.getElementById('loginForm');
  const emailEl  = document.getElementById('email');
  const passEl   = document.getElementById('password');
  const errorEl  = document.getElementById('error');
  const submitBt = document.getElementById('submitBtn');
  const toggle   = document.getElementById('togglePass');

  toggle.addEventListener('click', () => {
    const isPass = passEl.type === 'password';
    passEl.type = isPass ? 'text' : 'password';
    toggle.textContent = isPass ? 'Ocultar' : 'Mostrar';
    toggle.setAttribute('aria-label', isPass ? 'Ocultar senha' : 'Mostrar senha');
  });

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('show');
  }
  function clearError() {
    errorEl.classList.remove('show');
    errorEl.textContent = '';
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    clearError();

    const email = emailEl.value.trim();
    const pass  = passEl.value;

    if (!email || !pass) {
      showError('Preencha e-mail e senha.');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('E-mail inválido.');
      emailEl.focus();
      return;
    }

    submitBt.disabled = true;
    submitBt.textContent = 'Entrando...';

    setTimeout(() => {
      if (email === DEMO_USER && pass === DEMO_PASS) {
        if (document.getElementById('remember').checked) {
          localStorage.setItem('jus.session', email);
        } else {
          sessionStorage.setItem('jus.session', email);
        }
        window.location.href = 'app.html';
      } else {
        submitBt.disabled = false;
        submitBt.textContent = 'Entrar';
        showError('E-mail ou senha incorretos.');
        passEl.focus();
        passEl.select();
      }
    }, 400);
  });
</script>
</body>
</html>
